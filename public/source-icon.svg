<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3c.org/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#61dafb"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  
  <!-- Knowledge icon (simplified document with knowledge symbol) -->
  <g transform="translate(176, 176)">
    <!-- Document shape -->
    <rect x="0" y="0" width="160" height="200" rx="8" fill="#ffffff" opacity="0.9"/>
    
    <!-- Knowledge symbol (circle with cross) -->
    <circle cx="80" cy="80" r="40" stroke="#4CAF50" stroke-width="4" fill="none"/>
    <line x1="60" y1="60" x2="100" y2="100" stroke="#4CAF50" stroke-width="3"/>
    <line x1="100" y1="60" x2="60" y2="100" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Text lines -->
    <rect x="20" y="130" width="120" height="8" rx="2" fill="#999"/>
    <rect x="20" y="145" width="100" height="8" rx="2" fill="#999"/>
    <rect x="20" y="160" width="110" height="8" rx="2" fill="#999"/>
  </g>
</svg>